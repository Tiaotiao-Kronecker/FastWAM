# @package _global_

defaults:
  - override /data: robotwin
  - override /model: fastwam_one_step_shortcut
  - _self_

# dataloading
batch_size: 1
num_workers: 0

model:
  mot_checkpoint_mixed_attn: true
  one_step_shortcut:
    freeze_video_expert: true
    start_timestep: null
    step_size: 1.0

# scheduler
lr_scheduler_type: "cosine"
learning_rate: 1e-4
num_epochs: 1
max_steps: 10
log_every: 1
save_every: 10
eval_every: 0

# training
gradient_accumulation_steps: 1
weight_decay: 1e-2
resume: ./checkpoints/fastwam_release/robotwin_uncond_3cam_384.pt

wandb:
  enabled: false
